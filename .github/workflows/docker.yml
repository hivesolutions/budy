name: Docker Workflow
on:
  push:
    branches-ignore:
      - none
    tags:
      - "*"
    paths:
      - "**"
  workflow_dispatch:
jobs:
  build:
    name: Build
    timeout-minutes: 30
    runs-on: [self-hosted, ubuntu, latest]
    steps:
      - name: Checkout code from repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tag name based on branch
        id: set_tag
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            GITHUB_REFNAME=${{ github.ref_name }}
            BRANCH_NAME=${GITHUB_REFNAME//\//_}
            echo "tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: hivesolutions/budy:${{ steps.set_tag.outputs.tag }}
          provenance: true
          sbom: true

      - name: Trigger budy-ldj deployment
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: hivesolutions/deploy-action@v1
        with:
          repository: hivesolutions/infra-bemisc
          service: budy-ldj
          group: apps
          tag: ${{ github.ref_name }}
          token: ${{ secrets.INFRA_DEPLOY_PAT }}
